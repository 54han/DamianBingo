<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Chłopaki przepierdalają faceita - BINGO</title>

<style>

html,body{
margin:0;
padding:0;
overflow-x:hidden;
}

body{
background:#f7f7f7;
font-family:Arial, sans-serif;
text-align:center;
user-select:none;
}

h1{
margin-top:20px;
}

.topBar{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:10px;
}

button{
padding:10px 16px;
font-size:16px;
cursor:pointer;
background:#e53935;
color:white;
border:none;
border-radius:6px;
}

button:hover{
background:#c62828;
}

#progressContainer{
width:300px;
margin:10px auto;
}

#progressBar{
height:12px;
background:#ddd;
border-radius:6px;
overflow:hidden;
}

#progressFill{
height:100%;
width:0%;
background:#4caf50;
}

#progressText{
margin-top:6px;
font-size:14px;
}

table{
border-collapse:collapse;
margin:20px auto;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
border-radius:10px;
overflow:hidden;
background:white;
}

td{
border:1px solid #ddd;
width:160px;
height:100px;
text-align:center;
vertical-align:middle;
padding:10px;
position:relative;
}

.title{
font-size:28px;
font-weight:bold;
height:50px;
background:#fafafa;
}

.subtitle{
font-size:22px;
font-weight:bold;
height:40px;
background:#fafafa;
}

.cell{
cursor:pointer;
transition:background 0.15s;
}

.cell:hover{
background:#f3f3f3;
}

.cell.marked{
background:#eeeeee;
}

.cell.marked::after{
content:"X";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:red;
opacity:0.75;
font-weight:bold;
pointer-events:none;
animation:popX 0.25s ease;
}

@keyframes popX{
0%{transform:translate(-50%,-50%) scale(0.2)}
80%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}
}

.counter{
position:absolute;
bottom:6px;
right:8px;
font-size:13px;
color:#333;
font-weight:bold;
background:rgba(255,255,255,0.75);
padding:2px 6px;
border-radius:4px;
}

.counterButtons{
position:absolute;
bottom:5px;
left:5px;
display:flex;
gap:4px;
}

.counterButtons button{
font-size:12px;
padding:2px 6px;
background:#666;
}

.counterButtons button:hover{
background:#444;
}

#bingoMessage{
font-size:50px;
font-weight:bold;
color:#e53935;
margin-top:10px;
display:none;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

#confetti{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
z-index:999;
}

/* SWITCH */

.themeSwitch{
position:relative;
display:inline-block;
width:60px;
height:30px;
}

.themeSwitch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ffd54f;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"☀️";
height:24px;
width:24px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
transition:.4s;
}

input:checked + .slider{
background:#1e2a3a;
}

input:checked + .slider:before{
transform:translateX(30px);
content:"🌙";
}

/* DARK MODE */

body.dark{
background:#0f1724;
color:#e4e8f0;
}

body.dark table{
background:#1b2433;
}

body.dark .subtitle{
background:#1b2433;
color:#e4e8f0;
}

body.dark td{
border:1px solid #2f3a4d;
}

body.dark .cell:hover{
background:#263246;
}

body.dark .cell.marked{
background:#2a3447;
}

body.dark .counter{
background:rgba(20,30,50,0.8);
color:#e4e8f0;
}

body.dark #progressBar{
background:#2a3447;
}

body.dark button{
background:#394b66;
}

body.dark button:hover{
background:#2f3d55;
}

@media(max-width:900px){

td{
width:120px;
height:90px;
font-size:14px;
}

}

</style>
</head>

<body>

<h1>Damian gra faceita</h1>

<div class="topBar">

<button id="reset">RESET BINGO</button>

<label class="themeSwitch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>

</div>

<div id="progressContainer">

<div id="progressBar">
<div id="progressFill"></div>
</div>

<div id="progressText">0 / 25</div>

</div>

<table>

<tr>
<td class="subtitle" colspan="5">BINGO</td>
</tr>

<tbody id="board"></tbody>

</table>

<div id="bingoMessage">BINGO!</div>

<canvas id="confetti"></canvas>

<audio id="bingoSound" src="bingo.mp3"></audio>

<script>

const cellsContent=[

'Komplementowanie przeciwnika że jest dobry/mocny/niesamowity',
'*Randomowe darcie pizdy po wyjebce*',
'Narzekanie na siebie że jest chujowy',
'"A/B czyste"',
'"O co tu kurwa chodzi"',
'*westchnienie*',
'"Jak on nie zginął"',
'*Bekanie*',
'"Zaraz się zrzygam"',
'"najs" x15',
'*gada coś ale push to talk mu przerywa*',
'Narzekanie na gre że jest rozjebana/chujowa',
'"ja pierdole" x15',
'*śmiech na głos*',
'Zabranie komuś AWP / pytanie czy kupić komus AWP',
'Sprawdzanie przeciwników czy odjebani albo smurfy',
'"Low ma / obity"',
'"Powinienem go zabić"',
'"Daj" - na pytanie czy chce flasha',
'"Na blisko"',
'"Short" x15',
'Gra Dual Beretty',
'"nie wiem"',
'"Po głowie"',
'Narzekanie na własną taktykę'

];

const board=document.getElementById("board");
const bingoSound=document.getElementById("bingoSound");

let state=JSON.parse(localStorage.getItem("bingoState"));

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
while(array.length<25)array.push("");
return array;
}

if(!state){
state={
cells:shuffle([...cellsContent]),
marked:Array(25).fill(false),
counters:Array(25).fill(0)
};
}

function save(){
localStorage.setItem("bingoState",JSON.stringify(state));
}

function updateProgress(){

let done=state.marked.filter(v=>v).length;

document.getElementById("progressText").innerText=done+" / 25";

document.getElementById("progressFill").style.width=(done/25*100)+"%";

}

function render(){

board.innerHTML="";

for(let r=0;r<5;r++){

let tr=document.createElement("tr");

for(let c=0;c<5;c++){

let i=r*5+c;

let td=document.createElement("td");
td.className="cell";

let text=state.cells[i];
let match=text.match(/x(\d+)/i);

if(match){

let target=parseInt(match[1]);
text=text.replace(/x\d+/i,"");

td.innerHTML=text;

let counter=document.createElement("div");
counter.className="counter";

let buttons=document.createElement("div");
buttons.className="counterButtons";

let plus=document.createElement("button");
plus.innerText="+";

let minus=document.createElement("button");
minus.innerText="-";

buttons.appendChild(minus);
buttons.appendChild(plus);

td.appendChild(counter);
td.appendChild(buttons);

function update(){

if(state.counters[i]>target)state.counters[i]=target;

counter.innerText=state.counters[i]+"/"+target;

if(state.counters[i]>=target){
state.marked[i]=true;
td.classList.add("marked");
}else{
state.marked[i]=false;
td.classList.remove("marked");
}

updateProgress();
checkBingo();
save();

}

plus.onclick=(e)=>{
e.stopPropagation();
if(state.counters[i]<target){
state.counters[i]++;
update();
}
};

minus.onclick=(e)=>{
e.stopPropagation();
if(state.counters[i]>0){
state.counters[i]--;
update();
}
};

td.onclick=()=>{
if(state.counters[i]<target){
state.counters[i]++;
update();
}
};

update();

}else{

td.innerHTML=text;

if(state.marked[i])td.classList.add("marked");

td.onclick=()=>{
state.marked[i]=!state.marked[i];
td.classList.toggle("marked");
updateProgress();
checkBingo();
save();
};

}

tr.appendChild(td);

}

board.appendChild(tr);

}

updateProgress();
checkBingo();

}

let bingoPlayed=false;

function checkBingo(){

if(state.marked.every(v=>v)){

document.getElementById("bingoMessage").style.display="block";

if(!bingoPlayed){
bingoSound.play();
startConfetti();
bingoPlayed=true;
}

}else{

document.getElementById("bingoMessage").style.display="none";
bingoPlayed=false;

}

}

document.getElementById("reset").onclick=()=>{

if(confirm("Zresetować planszę?")){
localStorage.removeItem("bingoState");
location.reload();
}

};

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let confetti=[];

function startConfetti(){

confetti=[];

for(let i=0;i<250;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
size:Math.random()*8+4,
speed:Math.random()*3+2,
angle:Math.random()*360,
spin:(Math.random()-0.5)*0.2,
color:`hsl(${Math.random()*360},80%,60%)`
});

}

animateConfetti();

setTimeout(()=>confetti=[],7000);

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(p=>{

p.y+=p.speed;
p.angle+=p.spin;

ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.angle);

ctx.fillStyle=p.color;
ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);

ctx.restore();

});

if(confetti.length>0)requestAnimationFrame(animateConfetti);

}

const themeToggle=document.getElementById("themeToggle");

let savedTheme=localStorage.getItem("theme");

if(savedTheme==="dark"){
document.body.classList.add("dark");
themeToggle.checked=true;
}

themeToggle.addEventListener("change",()=>{

if(themeToggle.checked){
document.body.classList.add("dark");
localStorage.setItem("theme","dark");
}else{
document.body.classList.remove("dark");
localStorage.setItem("theme","light");
}

});

render();

</script>

</body>
</html>
